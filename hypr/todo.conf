# todo — Hyprland floating quick-todo window
#
# Install: copy to ~/.config/hypr/todo.conf and add this line to hyprland.conf:
#   source = ~/.config/hypr/todo.conf
# then `hyprctl reload`.
#
# Uses Omarchy's omarchy-launch-tui (app-id org.omarchy.<bin>). On vanilla
# Hyprland, replace the bind's exec with your terminal, e.g.:
#   kitty --class org.omarchy.todo -e todo tui --compact
# Use an absolute binary path so it resolves inside the graphical session.

# Float, center, and compact-size the todo window by its app-id class.
windowrule = float on,     match:class ^(org\.omarchy\.todo)$
windowrule = center on,    match:class ^(org\.omarchy\.todo)$
windowrule = size 600 460, match:class ^(org\.omarchy\.todo)$

# SUPER + Alt + T → open the floating compact todo list.
bindd = SUPER ALT, T, Todo, exec, omarchy-launch-tui ~/.cargo/bin/todo tui --compact
