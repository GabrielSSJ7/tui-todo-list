# todo — tmux integration
# Source from ~/.tmux.conf:  source-file /path/to/todo/tmux/todo.conf
# (or run `todo tmux-config` to print this with the resolved binary name)

# Popup TUI on prefix + T
bind T display-popup -E -w 80% -h 80% 'todo tui'

# Open-task summary in the status bar (refreshes every 30s)
set -g status-right '#(todo status) | %H:%M'
set -g status-interval 30
